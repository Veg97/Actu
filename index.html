<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Fil — Agrégateur d'Actualités</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #f5f0e8;
            --paper-light: #faf7f1;
            --accent: #c0392b;
            --gray-1: #333;
            --gray-2: #666;
            --gray-3: #999;
            --gray-4: #ccc;
            --gray-5: #e8e3db;
            --rule: #c8c2b6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', 'Georgia', serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: var(--ink);
            color: var(--paper);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 32px;
        }

        .masthead {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .masthead .le { font-style: italic; font-weight: 400; opacity: 0.7; }
        .masthead .fil { color: var(--accent); }

        .header-date {
            font-size: 0.85rem;
            opacity: 0.6;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .pulse {
            width: 8px; height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .section-bar {
            background: #222;
            border-top: 1px solid #333;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .section-bar::-webkit-scrollbar { display: none; }

        .section-tabs {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            gap: 0;
        }

        .section-tab {
            padding: 10px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
        }

        .section-tab:hover { color: #ccc; }
        .section-tab.active { color: var(--paper); border-bottom-color: var(--accent); }

        .tab-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            background: #444;
            color: #aaa;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .section-tab.active .tab-count {
            background: var(--accent);
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        .edition-line {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--gray-3);
            border-bottom: 1px solid var(--rule);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .feed-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 0;
            gap: 20px;
        }

        .loader {
            width: 40px; height: 40px;
            border: 3px solid var(--gray-5);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 0.9rem;
            color: var(--gray-3);
            font-weight: 300;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
        }

        .article-card {
            padding: 24px;
            border-right: 1px solid var(--rule);
            border-bottom: 1px solid var(--rule);
            transition: background 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .article-card:hover { background: var(--paper-light); }
        .article-card:nth-child(3n) { border-right: none; }

        .article-card.featured {
            grid-column: 1 / -1;
            padding: 40px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            align-items: start;
            border-right: none;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .article-source {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .article-time {
            font-size: 0.75rem;
            color: var(--gray-3);
            font-weight: 300;
        }

        .article-meta .sep {
            width: 3px; height: 3px;
            background: var(--gray-4);
            border-radius: 50%;
        }

        .article-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 8px;
            color: var(--ink);
        }

        .article-card.featured .article-title {
            font-size: 2rem;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .article-desc {
            font-size: 0.9rem;
            color: var(--gray-2);
            line-height: 1.55;
            font-weight: 300;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-card.featured .article-desc {
            -webkit-line-clamp: 5;
            font-size: 1rem;
        }

        .article-thumbnail {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            border-radius: 2px;
            background: var(--gray-5);
        }

        .article-card:not(.featured) .article-thumbnail {
            aspect-ratio: 16/9;
            margin-bottom: 12px;
        }

        .section-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 2px;
        }

        .badge-international { background: #2c3e50; color: #fff; }
        .badge-france { background: #0055a4; color: #fff; }
        .badge-economie { background: #27ae60; color: #fff; }
        .badge-informatique { background: #8e44ad; color: #fff; }
        .badge-jeuvideo { background: #e67e22; color: #fff; }

        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-3);
        }

        .error-msg h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--gray-2);
        }

        footer {
            border-top: 2px solid var(--ink);
            margin-top: 40px;
            padding: 24px 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--gray-3);
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        .refresh-btn {
            background: var(--ink);
            color: var(--paper);
            border: none;
            padding: 8px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }

        .refresh-btn:hover { background: var(--accent); }

        @media (max-width: 1024px) {
            .articles-grid { grid-template-columns: repeat(2, 1fr); }
            .article-card:nth-child(3n) { border-right: 1px solid var(--rule); }
            .article-card:nth-child(2n) { border-right: none; }
            .article-card.featured { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            .header-top { padding: 12px 16px; }
            .masthead { font-size: 1.5rem; }
            .header-date { display: none; }
            .container { padding: 16px; }
            .section-tabs { padding: 0 16px; }
            .section-tab { padding: 8px 14px; font-size: 0.7rem; }
            .articles-grid { grid-template-columns: 1fr; }
            .article-card { border-right: none !important; }
            .article-card.featured { grid-template-columns: 1fr; padding: 24px 16px; }
            .article-card.featured .article-title { font-size: 1.5rem; }
            footer { flex-direction: column; gap: 16px; text-align: center; }
            .edition-line { padding: 8px 16px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="masthead"><span class="le">Le</span><span class="fil">Fil</span></div>
        <div class="header-date" id="headerDate"></div>
        <div class="header-status"><div class="pulse"></div><span>En direct</span></div>
    </div>
    <div class="section-bar">
        <div class="section-tabs" id="sectionTabs"></div>
    </div>
</header>

<div class="edition-line">
    <span>Édition continue — Agrégation de sources publiques</span>
    <span class="feed-count" id="feedCount"></span>
</div>

<div class="container">
    <div id="content">
        <div class="loading-state">
            <div class="loader"></div>
            <div class="loading-text">Chargement des dépêches…</div>
        </div>
    </div>
</div>

<footer>
    <div>
        <strong>Le Fil</strong> — Agrégateur RSS open source · Hébergé sur <a href="https://pages.github.com" target="_blank">GitHub Pages</a><br>
        Sources : France 24 · Le Monde · Franceinfo · RFI · 20 Minutes · Numerama · Gamekult
    </div>
    <button class="refresh-btn" onclick="loadAllFeeds()">⟳ Actualiser</button>
</footer>

<script>
const SECTIONS = [
    {
        id: 'all',
        name: 'À la Une',
        feeds: []
    },
    {
        id: 'international',
        name: 'International',
        badgeClass: 'badge-international',
        feeds: [
            { url: 'https://www.france24.com/fr/rss', source: 'France 24' },
            { url: 'https://www.lemonde.fr/international/rss_full.xml', source: 'Le Monde' },
            { url: 'https://www.rfi.fr/fr/rss', source: 'RFI' },
            { url: 'https://www.francetvinfo.fr/monde.rss', source: 'Franceinfo' },
        ]
    },
    {
        id: 'france',
        name: 'France',
        badgeClass: 'badge-france',
        feeds: [
            { url: 'https://www.france24.com/fr/france/rss', source: 'France 24' },
            { url: 'https://www.lemonde.fr/politique/rss_full.xml', source: 'Le Monde' },
            { url: 'https://www.francetvinfo.fr/france.rss', source: 'Franceinfo' },
            { url: 'https://www.20minutes.fr/feeds/rss-une.xml', source: '20 Minutes' },
        ]
    },
    {
        id: 'economie',
        name: 'Économie',
        badgeClass: 'badge-economie',
        feeds: [
            { url: 'https://www.lemonde.fr/economie/rss_full.xml', source: 'Le Monde' },
            { url: 'https://www.france24.com/fr/eco-tech/rss', source: 'France 24' },
            { url: 'https://www.francetvinfo.fr/economie.rss', source: 'Franceinfo' },
        ]
    },
    {
        id: 'informatique',
        name: 'Informatique',
        badgeClass: 'badge-informatique',
        feeds: [
            { url: 'https://www.numerama.com/feed/', source: 'Numerama' },
            { url: 'https://www.lemonde.fr/pixels/rss_full.xml', source: 'Le Monde Pixels' },
        ]
    },
    {
        id: 'jeuvideo',
        name: 'Jeux Vidéo',
        badgeClass: 'badge-jeuvideo',
        feeds: [
            { url: 'https://www.gamekult.com/feed.xml', source: 'Gamekult' },
            { url: 'https://www.numerama.com/pop-culture/feed/', source: 'Numerama' },
        ]
    }
];

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
let articlesBySection = {};
let currentSection = 'all';

// Date
(function() {
    const d = new Date();
    let str = d.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('headerDate').textContent = str.charAt(0).toUpperCase() + str.slice(1);
})();

// Tabs
function buildTabs() {
    const el = document.getElementById('sectionTabs');
    el.innerHTML = '';
    SECTIONS.forEach(sec => {
        const tab = document.createElement('div');
        tab.className = 'section-tab' + (sec.id === currentSection ? ' active' : '');
        const n = (articlesBySection[sec.id] || []).length;
        tab.innerHTML = sec.name + (n > 0 ? `<span class="tab-count">${n}</span>` : '');
        tab.addEventListener('click', () => {
            currentSection = sec.id;
            document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderArticles();
        });
        el.appendChild(tab);
    });
}

// Fetch
async function fetchFeed(url, source) {
    try {
        const r = await fetch(RSS2JSON + encodeURIComponent(url));
        const d = await r.json();
        if (d.status !== 'ok') return [];
        return d.items.map(item => ({
            title: item.title || '',
            link: item.link || '#',
            description: strip(item.description || ''),
            thumbnail: item.thumbnail || item.enclosure?.link || imgFromHtml(item.description || item.content || ''),
            pubDate: new Date(item.pubDate),
            source
        }));
    } catch(e) { console.warn('Feed error:', url, e); return []; }
}

function strip(html) { const t = document.createElement('div'); t.innerHTML = html; return t.textContent || ''; }
function imgFromHtml(h) { const m = h.match(/<img[^>]+src=["']([^"']+)["']/i); return m ? m[1] : ''; }

// Load
async function loadAllFeeds() {
    document.getElementById('content').innerHTML = '<div class="loading-state"><div class="loader"></div><div class="loading-text">Chargement des dépêches…</div></div>';

    articlesBySection = {};
    const feedMap = {};

    SECTIONS.filter(s => s.id !== 'all').forEach(sec => {
        articlesBySection[sec.id] = [];
        sec.feeds.forEach(f => {
            if (!feedMap[f.url]) feedMap[f.url] = { url: f.url, source: f.source, sids: [] };
            feedMap[f.url].sids.push(sec.id);
        });
    });

    const results = await Promise.allSettled(
        Object.values(feedMap).map(t => fetchFeed(t.url, t.source).then(a => ({ ...t, articles: a })))
    );

    results.forEach(r => {
        if (r.status === 'fulfilled' && r.value.articles) {
            r.value.sids.forEach(sid => articlesBySection[sid].push(...r.value.articles));
        }
    });

    Object.keys(articlesBySection).forEach(k => { articlesBySection[k] = dedupe(articlesBySection[k]); });
    // À la Une = uniquement International + France
    articlesBySection['all'] = dedupe([
        ...articlesBySection['international'],
        ...articlesBySection['france']
    ]);

    document.getElementById('feedCount').textContent = articlesBySection['all'].length + ' articles';
    buildTabs();
    renderArticles();
}

function dedupe(arr) {
    const seen = new Set();
    return arr.filter(a => {
        const k = a.title.toLowerCase().substring(0, 60);
        if (seen.has(k)) return false;
        seen.add(k);
        return true;
    }).sort((a, b) => b.pubDate - a.pubDate);
}

// Render
function renderArticles() {
    const el = document.getElementById('content');
    const arts = articlesBySection[currentSection] || [];

    if (!arts.length) {
        el.innerHTML = '<div class="error-msg"><h3>Aucun article disponible</h3><p>Les flux de cette section sont temporairement indisponibles.</p></div>';
        return;
    }

    const grid = document.createElement('div');
    grid.className = 'articles-grid';

    arts.slice(0, 30).forEach((a, i) => {
        const card = document.createElement('a');
        card.className = 'article-card' + (i === 0 ? ' featured' : '');
        card.href = a.link;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';

        const time = timeAgo(a.pubDate);
        const desc = a.description.substring(0, 200);

        let badge = '';
        if (currentSection === 'all') {
            const sec = findSection(a);
            if (sec?.badgeClass) badge = `<span class="section-badge ${sec.badgeClass}">${sec.name}</span>`;
        }

        if (i === 0) {
            card.innerHTML = `
                <div>
                    <div class="article-meta">
                        <span class="article-source">${a.source}</span>
                        <span class="sep"></span>
                        <span class="article-time">${time}</span>
                        ${badge}
                    </div>
                    <h2 class="article-title">${esc(a.title)}</h2>
                    <p class="article-desc">${esc(desc)}</p>
                </div>
                ${a.thumbnail ? `<img class="article-thumbnail" src="${a.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">` : '<div></div>'}`;
        } else {
            card.innerHTML = `
                ${a.thumbnail ? `<img class="article-thumbnail" src="${a.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
                <div class="article-meta">
                    <span class="article-source">${a.source}</span>
                    <span class="sep"></span>
                    <span class="article-time">${time}</span>
                    ${badge}
                </div>
                <h3 class="article-title">${esc(a.title)}</h3>
                <p class="article-desc">${esc(desc)}</p>`;
        }
        grid.appendChild(card);
    });

    el.innerHTML = '';
    el.appendChild(grid);
}

function findSection(article) {
    for (const sid of ['jeuvideo','informatique','economie','france','international']) {
        if (articlesBySection[sid]?.some(x => x.title === article.title && x.source === article.source)) {
            return SECTIONS.find(s => s.id === sid);
        }
    }
    return null;
}

function timeAgo(d) {
    const s = Math.floor((new Date() - d) / 1000);
    if (s < 60) return "À l'instant";
    if (s < 3600) return `Il y a ${Math.floor(s/60)} min`;
    if (s < 86400) return `Il y a ${Math.floor(s/3600)}h`;
    if (s < 172800) return 'Hier';
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

buildTabs();
loadAllFeeds();
setInterval(loadAllFeeds, 5 * 60 * 1000);
</script>
</body>
</html>
